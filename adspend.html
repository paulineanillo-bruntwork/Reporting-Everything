<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow, noarchive, nosnippet">
<title>Ad Spend Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<style>
:root{--bg:#f4f6fb;--surface:#fff;--border:#e2e8f0;--text:#1e293b;--text-muted:#64748b;--blue:#2563eb;--blue-dark:#1e40af;--green:#059669;--green-light:#d1fae5;--red:#dc2626;--red-light:#fee2e2;--radius:16px;--shadow:0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Inter,-apple-system,BlinkMacSystemFont,sans-serif;background:var(--bg);color:var(--text);line-height:1.5}
.header{background:linear-gradient(135deg,#1e293b,#334155);color:#fff;padding:28px 40px 20px;display:flex;justify-content:space-between;align-items:flex-start}
.header h1{font-size:26px;font-weight:700;letter-spacing:-.5px;margin-bottom:4px}
.header .subtitle{color:#94a3b8;font-size:13px}
.header .timestamp{color:#64748b;font-size:12px;margin-top:6px}
.back-link{display:inline-block;padding:8px 16px;background:rgba(255,255,255,.1);color:#cbd5e1;border:1px solid rgba(255,255,255,.2);border-radius:6px;font-size:13px;font-weight:500;text-decoration:none}
.back-link:hover{background:rgba(255,255,255,.2)}
.nav-bar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 40px;display:flex;position:sticky;top:0;z-index:100;box-shadow:0 1px 4px rgba(0,0,0,.04)}
.tab-btn{padding:14px 28px;border:none;background:transparent;cursor:pointer;font-size:14px;font-weight:500;color:var(--text-muted);border-bottom:3px solid transparent;transition:all .2s}
.tab-btn:hover{color:var(--text);background:#f8fafc}
.tab-btn.active{color:var(--blue);border-bottom-color:var(--blue);font-weight:600}
.main{padding:28px 40px 40px;max-width:1400px;margin:0 auto}
.tab-content{display:none}.tab-content.active{display:block}
.loading{text-align:center;padding:80px 20px;color:var(--text-muted)}
.loading .spinner{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}
.cards{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:28px}
.card{background:var(--surface);border-radius:var(--radius);padding:20px 24px;box-shadow:var(--shadow);border:1px solid var(--border)}
.card .label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--text-muted);margin-bottom:8px}
.card .value{font-size:28px;font-weight:700;letter-spacing:-.5px}
.card .sub{font-size:12px;color:var(--text-muted);margin-top:4px}
.chart-box{background:var(--surface);border-radius:var(--radius);padding:24px;box-shadow:var(--shadow);border:1px solid var(--border);margin-bottom:28px}
.chart-box h3{font-size:16px;font-weight:600;margin-bottom:16px}
.chart-wrap{position:relative;height:320px}
.tbl-box{background:var(--surface);border-radius:var(--radius);box-shadow:var(--shadow);border:1px solid var(--border);overflow:hidden}
.tbl-box h3{font-size:16px;font-weight:600;padding:20px 24px 0}
table{width:100%;border-collapse:collapse;font-size:13px}
thead th{text-align:left;padding:12px 16px;font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--text-muted);border-bottom:2px solid var(--border);background:#f8fafc}
tbody td{padding:10px 16px;border-bottom:1px solid var(--border)}
tbody tr:hover{background:#f8fafc}
.badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600}
.badge-enabled{background:var(--green-light);color:var(--green)}
.badge-paused{background:var(--red-light);color:var(--red)}
.badge-removed{background:#f1f5f9;color:var(--text-muted)}
.ar{text-align:right}
@media(max-width:900px){.cards{grid-template-columns:repeat(2,1fr)}.header,.nav-bar,.main{padding-left:20px;padding-right:20px}}
@media(max-width:600px){.cards{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="header">
  <div>
    <h1>Ad Spend Dashboard</h1>
    <div class="subtitle">Google Ads campaign performance</div>
    <div class="timestamp" id="dateRange"></div>
  </div>
  <div style="display:flex;gap:8px;align-items:center">
    <a href="/" class="back-link">FTE Dashboard</a>
    <a href="/logout" class="back-link">Log out</a>
  </div>
</div>
<div class="nav-bar">
  <button class="tab-btn active" onclick="switchTab(&quot;overview&quot;,this)">Overview</button>
  <button class="tab-btn" onclick="switchTab(&quot;campaigns&quot;,this)">Campaigns</button>
  <button class="tab-btn" onclick="switchTab(&quot;daily&quot;,this)">Daily Breakdown</button>
</div>
<div class="main">
<div id="loadingAds" class="loading"><div class="spinner"></div><div>Loading Google Ads data...</div></div>
<div id="tab-overview" class="tab-content">
  <div class="cards" id="summaryCards"></div>
  <div class="chart-box"><h3>Daily Spend</h3><div class="chart-wrap"><canvas id="chartSpend"></canvas></div></div>
  <div class="chart-box"><h3>Daily Clicks &amp; Conversions</h3><div class="chart-wrap"><canvas id="chartClicks"></canvas></div></div>
</div>
<div id="tab-campaigns" class="tab-content">
  <div class="tbl-box"><h3>Campaign Performance</h3>
  <div style="overflow-x:auto"><table id="tblCamp"><thead><tr>
    <th>Campaign</th><th>Status</th><th class="ar">Clicks</th><th class="ar">Impressions</th>
    <th class="ar">CTR</th><th class="ar">Avg CPC</th><th class="ar">Cost</th><th class="ar">Conversions</th>
  </tr></thead><tbody></tbody></table></div></div>
</div>
<div id="tab-daily" class="tab-content">
  <div class="tbl-box"><h3>Daily Performance</h3>
  <div style="overflow-x:auto"><table id="tblDaily"><thead><tr>
    <th>Date</th><th class="ar">Clicks</th><th class="ar">Impressions</th>
    <th class="ar">CTR</th><th class="ar">Avg CPC</th><th class="ar">Cost</th><th class="ar">Conversions</th>
  </tr></thead><tbody></tbody></table></div></div>
</div>
</div>
<script src="adspend-app.js"></script>
</body>
</html>
