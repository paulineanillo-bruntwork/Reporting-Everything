<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow, noarchive, nosnippet">
<title>Monthly KPI Report</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0/dist/chartjs-plugin-datalabels.min.js"></script>
<style>
:root{--bg:#f4f6fb;--surface:#fff;--border:#e2e8f0;--text:#1e293b;--text-muted:#64748b;--blue:#2563eb;--blue-dark:#1e40af;--green:#059669;--green-light:#d1fae5;--red:#dc2626;--red-light:#fee2e2;--orange:#d97706;--orange-light:#fef3c7;--purple:#7c3aed;--radius:16px;--shadow:0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Inter,-apple-system,BlinkMacSystemFont,sans-serif;background:var(--bg);color:var(--text);line-height:1.5}
.header{background:linear-gradient(135deg,#1e293b,#334155);color:#fff;padding:28px 40px 20px;display:flex;justify-content:space-between;align-items:flex-start}
.header h1{font-size:26px;font-weight:700;letter-spacing:-.5px;margin-bottom:4px}
.header .subtitle{color:#94a3b8;font-size:13px}
.back-link{display:inline-block;padding:8px 16px;background:rgba(255,255,255,.1);color:#cbd5e1;border:1px solid rgba(255,255,255,.2);border-radius:6px;font-size:13px;font-weight:500;text-decoration:none}
.back-link:hover{background:rgba(255,255,255,.2)}
.nav-links{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.month-nav{display:flex;gap:8px;align-items:center}
.month-nav a{padding:6px 14px;background:rgba(255,255,255,.1);color:#cbd5e1;border:1px solid rgba(255,255,255,.2);border-radius:6px;font-size:13px;text-decoration:none;cursor:pointer}
.month-nav a:hover{background:rgba(255,255,255,.2)}
.month-nav .current{background:rgba(37,99,235,.3);border-color:rgba(37,99,235,.5);color:#93c5fd}
.main{padding:28px 40px 60px;max-width:1400px;margin:0 auto}
.loading{text-align:center;padding:80px 20px;color:var(--text-muted)}
.loading .spinner{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}

/* Highlight Panels */
.highlight-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:32px}
.highlight-panel{background:var(--surface);border-radius:var(--radius);padding:24px 28px;box-shadow:var(--shadow);border:1px solid var(--border);position:relative;overflow:hidden}
.highlight-panel .accent{position:absolute;top:0;left:0;width:4px;height:100%;border-radius:4px 0 0 4px}
.highlight-panel .label{font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--text-muted);margin-bottom:8px}
.highlight-panel .value{font-size:32px;font-weight:800;color:var(--text);font-variant-numeric:tabular-nums;line-height:1.1}
.highlight-panel .meta{display:flex;gap:12px;align-items:center;margin-top:10px;flex-wrap:wrap}
.highlight-panel .change{font-size:12px;font-weight:600;padding:2px 8px;border-radius:4px}
.highlight-panel .change.pos{color:var(--green);background:var(--green-light)}
.highlight-panel .change.neg{color:var(--red);background:var(--red-light)}
.highlight-panel .change.neutral{color:var(--text-muted);background:#f1f5f9}
.highlight-panel .prev-val{font-size:11px;color:var(--text-muted)}

/* Section */
.section{margin-bottom:32px}
.section-title{font-size:18px;font-weight:700;margin-bottom:16px;display:flex;align-items:center;gap:10px}
.section-title .dot{width:10px;height:10px;border-radius:50%;display:inline-block}

/* Sub-section blocks */
.sub-block{background:var(--surface);border-radius:var(--radius);box-shadow:var(--shadow);border:1px solid var(--border);margin-bottom:16px;overflow:hidden}
.sub-block-header{padding:12px 16px;font-weight:700;font-size:12px;text-transform:uppercase;letter-spacing:.5px;color:var(--text-muted);background:#f8fafc;border-bottom:1px solid var(--border)}

/* KPI Table */
.kpi-table{width:100%;border-collapse:collapse;font-size:13px}
.kpi-table thead th{text-align:left;padding:12px 16px;font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--text-muted);border-bottom:2px solid var(--border);background:#f8fafc}
.kpi-table tbody td{padding:10px 16px;border-bottom:1px solid var(--border)}
.kpi-table tbody tr:hover{background:#f8fafc}
.kpi-table tbody tr:last-child td{border-bottom:none}
.kpi-table .ar{text-align:right;font-variant-numeric:tabular-nums}
.change-pos{color:var(--green);font-weight:600}
.change-neg{color:var(--red);font-weight:600}
.change-zero{color:var(--text-muted)}

/* Show Trend toggle */
.trend-toggle{padding:8px 16px;border-top:1px solid var(--border);display:flex;align-items:center;gap:6px;cursor:pointer;user-select:none;font-size:12px;font-weight:600;color:var(--blue);background:#fafbfc}
.trend-toggle:hover{background:#f1f5f9}
.trend-toggle .arrow{transition:transform .2s;display:inline-block}
.trend-toggle.open .arrow{transform:rotate(180deg)}
.trend-chart{display:none;padding:16px;border-top:1px solid var(--border)}
.trend-chart.open{display:block}
.trend-chart-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.trend-chart-item{position:relative}
.trend-chart-item h4{font-size:12px;font-weight:600;color:var(--text-muted);margin-bottom:6px}
.trend-chart-item canvas{width:100%!important;height:200px!important}
@media(max-width:900px){.trend-chart-grid{grid-template-columns:1fr}}


@media(max-width:1100px){.highlight-grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:900px){.chart-grid{grid-template-columns:1fr}.header,.main{padding-left:20px;padding-right:20px}.highlight-grid{grid-template-columns:1fr}}
@media print{.header{background:#1e293b!important;-webkit-print-color-adjust:exact;print-color-adjust:exact}.nav-links,.month-nav{display:none!important}.main{padding:16px}}
</style>
</head>
<body>
<div class="header">
  <div>
    <h1 id="reportTitle">Monthly KPI Report</h1>
    <div class="subtitle" id="reportSubtitle">Loading...</div>
  </div>
  <div>
    <div class="month-nav" id="monthNav"></div>
    <div class="nav-links" style="margin-top:8px">
      <a href="/reports" class="back-link">Trends</a>
      <a href="/kpi" class="back-link">KPI Tracker</a>
      <a href="/" class="back-link">FTE Dashboard</a>
      <a href="/adspend" class="back-link">Ad Spend</a>
      <a href="/logout" class="back-link">Log out</a>
    </div>
  </div>
</div>
<div class="main">
<div id="loading" class="loading"><div class="spinner"></div><div>Loading report data...</div></div>
<div id="content" style="display:none">

<!-- Highlight Panels -->
<div class="highlight-grid" id="highlightPanels"></div>
<div class="sub-block" style="margin-bottom:28px">
  <div class="trend-toggle" data-target="highlightTrends" onclick="toggleTrend(this)"><span class="arrow">&#9660;</span> Show Trend</div>
  <div class="trend-chart" id="highlightTrends"><div class="trend-chart-grid" id="highlightCharts"></div></div>
</div>

<!-- New Client FTE Acquisition Section -->
<div class="section">
  <div class="section-title"><span class="dot" style="background:var(--blue)"></span> New Client FTE Acquisition</div>
  <div id="acqBlocks"></div>
</div>

<!-- Client Expansion Section -->
<div class="section">
  <div class="section-title"><span class="dot" style="background:var(--green)"></span> Client Expansion</div>
  <div id="expBlocks"></div>
</div>

<!-- Churn & Backfill Retention Section -->
<div class="section">
  <div class="section-title"><span class="dot" style="background:var(--red)"></span> Churn &amp; Backfill Retention</div>
  <div id="churnBlocks"></div>
</div>


</div><!-- /content -->
</div><!-- /main -->
<script>
// Register datalabels but disable globally
if (typeof ChartDataLabels !== 'undefined') Chart.register(ChartDataLabels);
Chart.defaults.plugins.datalabels = { display: false };
Chart.defaults.font.family = 'Inter,-apple-system,BlinkMacSystemFont,sans-serif';
Chart.defaults.font.size = 11;

var MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
var SHORT = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

function getMonthParam() {
  var p = new URLSearchParams(window.location.search).get('month');
  if (p && /^\d{4}-\d{2}$/.test(p)) return p;
  var now = new Date(Date.now() + 8*60*60*1000);
  return now.getUTCFullYear() + '-' + String(now.getUTCMonth()+1).padStart(2,'0');
}

function monthLabel(m) {
  var p = m.split('-');
  return MONTHS[parseInt(p[1])-1] + ' ' + p[0];
}

function prevMonthKey(m) {
  var p = m.split('-'), yr = parseInt(p[0]), mo = parseInt(p[1]);
  if (mo===1){yr--;mo=12;}else mo--;
  return yr+'-'+String(mo).padStart(2,'0');
}
function nextMonthKey(m) {
  var p = m.split('-'), yr = parseInt(p[0]), mo = parseInt(p[1]);
  if (mo===12){yr++;mo=1;}else mo++;
  return yr+'-'+String(mo).padStart(2,'0');
}

function parseMonth(label) {
  if (!label) return null;
  var s = label.trim();
  var parts = s.split(/\s+/);
  if (parts.length===2) {
    var mi = MONTHS.indexOf(parts[0]);
    if (mi===-1) mi = SHORT.indexOf(parts[0]);
    var yr = parseInt(parts[1]);
    if (mi>=0 && !isNaN(yr)) return {year:yr, month:mi};
  }
  var dp = s.split('-');
  if (dp.length===2) {
    var mi2 = SHORT.indexOf(dp[0]);
    if (mi2===-1) mi2 = MONTHS.indexOf(dp[0]);
    var yr2 = parseInt(dp[1]);
    if (mi2>=0 && !isNaN(yr2)) {
      if (yr2<100) yr2 += yr2<50?2000:1900;
      return {year:yr2, month:mi2};
    }
  }
  return null;
}

function pn(v) {
  if (v===undefined||v===null||v==='') return null;
  var n = parseFloat(String(v).replace(/[$,%]/g,'').replace(/,/g,''));
  return isNaN(n)?null:n;
}

function shortLabel(label) {
  var pm = parseMonth(label);
  if (!pm) return label;
  return SHORT[pm.month]+' '+String(pm.year).slice(-2);
}

function fmt(n) { return n===null||n===undefined?'—':Number(n).toLocaleString('en-US'); }
function fmtD(n,d) { return n===null||n===undefined?'—':Number(n).toLocaleString('en-US',{minimumFractionDigits:d||1,maximumFractionDigits:d||1}); }
function fmtM(n) { return n===null||n===undefined?'—':'$'+Number(n).toLocaleString('en-US',{minimumFractionDigits:0,maximumFractionDigits:0}); }
function fmtPct(n) { return n===null||n===undefined?'—':(Number(n)*100).toFixed(1)+'%'; }
function fmtPctRaw(n) { return n===null||n===undefined?'—':Number(n).toFixed(1)+'%'; }

function changeHtml(cur,prev,invertColor) {
  if (cur===null||prev===null||prev===0) return '<td class="ar change-zero">—</td>';
  var diff = cur-prev;
  var pctC = ((diff)/Math.abs(prev))*100;
  var label = (pctC>=0?'+':'')+pctC.toFixed(1)+'%';
  var cls;
  if (diff===0) cls='change-zero';
  else if (invertColor) cls=diff>0?'change-neg':'change-pos';
  else cls=diff>0?'change-pos':'change-neg';
  return '<td class="ar '+cls+'">'+label+'</td>';
}

// Column index map (from KPI sheet)
var C = {
  month:0, totalMRR:1, perAdmin:2, activeHC:3, activeFTE:4, adminStaff:5,
  mqls:6, fabiusCalls:7, showRate:8, newClientJobs:9, jobsVsCalls:10,
  salesAgentFTE:11, totalHires:12, fteCloseRate:13, fteConvJob:14,
  adsSpend:15, costPerCall:16, salesConvRate:17,
  recruitHC:23, endorsements:24, endorsePerHC:25,
  churnUnder1m:27,
  totalHiresHC:32, hiresPerHC:33,
  churnedFTE:34, churnRate:35, rolesToBackfill:36, backfillRate:37,
  backfillFTE:38, backfillCloseRate:39,
  existingClients:40, existingJobs:41,
  existingFTE:42, newClientFTE:43,
  totalHires47:47, newClientHires:48, newClientFTEConv:49
};

var MIN_MONTH = '2026-02';
var currentMonth = getMonthParam();
if (currentMonth < MIN_MONTH) { window.location.href = '/report?month='+MIN_MONTH; }
document.getElementById('reportSubtitle').textContent = monthLabel(currentMonth);

// Month nav
var nav = document.getElementById('monthNav');
var pm = prevMonthKey(currentMonth), nm = nextMonthKey(currentMonth);
var prevLink = pm >= MIN_MONTH ? '<a href="/report?month='+pm+'">&larr; '+monthLabel(pm)+'</a>' : '<a style="opacity:0.3;pointer-events:none">&larr; '+monthLabel(pm)+'</a>';
nav.innerHTML = prevLink+'<a class="current">'+monthLabel(currentMonth)+'</a><a href="/report?month='+nm+'">'+monthLabel(nm)+' &rarr;</a>';

// Fetch KPI data
fetch('/api/kpi-history').then(function(r){return r.json();}).then(function(data){
  if (data.error) {
    document.getElementById('loading').innerHTML = '<div style="color:var(--red)">'+data.error+'</div>';
    return;
  }
  document.getElementById('loading').style.display='none';
  document.getElementById('content').style.display='block';

  var cols = data.columns;
  var allMonths = data.months;

  // Parse month param into year/month
  var mp = currentMonth.split('-');
  var targetYear = parseInt(mp[0]), targetMo = parseInt(mp[1])-1;

  // Find row for current month and previous month
  var curIdx=-1, prevIdx=-1;
  for (var i=0;i<allMonths.length;i++) {
    var pm = parseMonth(allMonths[i][0]);
    if (pm && pm.year===targetYear && pm.month===targetMo) curIdx=i;
    var prevMo = targetMo===0?11:targetMo-1;
    var prevYr = targetMo===0?targetYear-1:targetYear;
    if (pm && pm.year===prevYr && pm.month===prevMo) prevIdx=i;
  }

  var cur = curIdx>=0 ? allMonths[curIdx] : null;
  var prev = prevIdx>=0 ? allMonths[prevIdx] : null;

  function cv(col) { return cur ? pn(cur[col]) : null; }
  function pv(col) { return prev ? pn(prev[col]) : null; }


  // === Highlight Panels ===
  var activeFTE = cv(C.activeFTE);
  var hiredFTE = cv(C.totalHires);
  var lostFTE = cv(C.churnedFTE);
  var netFTE = (hiredFTE!==null && lostFTE!==null) ? Math.round((hiredFTE - lostFTE)*100)/100 : null;

  var prevActiveFTE = pv(C.activeFTE);
  var prevHiredFTE = pv(C.totalHires);
  var prevLostFTE = pv(C.churnedFTE);
  var prevNetFTE = (prevHiredFTE!==null && prevLostFTE!==null) ? Math.round((prevHiredFTE - prevLostFTE)*100)/100 : null;

  var highlights = [
    { label:'Total Active FTE Headcount (Outsource)', value:activeFTE, prev:prevActiveFTE, format:'num', color:'var(--blue)' },
    { label:'FTEs Hired', value:hiredFTE, prev:prevHiredFTE, format:'dec', color:'var(--green)' },
    { label:'Lost FTEs', value:lostFTE, prev:prevLostFTE, format:'dec', color:'var(--red)', invert:true },
    { label:'Net FTE Gain/Loss', value:netFTE, prev:prevNetFTE, format:'dec', color:'var(--purple)' }
  ];

  var hHtml = '';
  for (var t=0;t<highlights.length;t++) {
    var h = highlights[t];
    var valStr = '—';
    if (h.value!==null) {
      if (h.format==='dec') valStr = fmtD(h.value);
      else valStr = fmt(h.value);
      // Add +/- prefix for Net FTE
      if (h.label.indexOf('Net')===0 && h.value>0) valStr = '+'+valStr;
    }
    var changeBadge = '';
    if (h.value!==null && h.prev!==null && h.prev!==0) {
      var diff = h.value - h.prev;
      var pctC = (diff/Math.abs(h.prev))*100;
      var cls = diff===0?'neutral': (h.invert ? (diff>0?'neg':'pos') : (diff>0?'pos':'neg'));
      changeBadge = '<span class="change '+cls+'">'+(pctC>=0?'+':'')+pctC.toFixed(1)+'%</span>';
    }
    var prevStr = h.prev!==null ? '<span class="prev-val">Prev: '+(h.format==='dec'?fmtD(h.prev):fmt(h.prev))+'</span>' : '';
    hHtml += '<div class="highlight-panel"><div class="accent" style="background:'+h.color+'"></div><div class="label">'+h.label+'</div><div class="value">'+valStr+'</div><div class="meta">'+changeBadge+prevStr+'</div></div>';
  }
  document.getElementById('highlightPanels').innerHTML = hHtml;

  // === Build 13-month trend slices ===
  var gmt8 = new Date(Date.now() + 8*60*60*1000);
  var nowYear = gmt8.getUTCFullYear(), nowMonth = gmt8.getUTCMonth();
  var nowIdx = -1;
  for (var si=0;si<allMonths.length;si++) {
    var spm = parseMonth(allMonths[si][0]);
    if (spm && spm.year===nowYear && spm.month===nowMonth) { nowIdx=si; break; }
  }
  var endCur = nowIdx>=0 ? nowIdx+1 : allMonths.length;
  var startCur = Math.max(0, endCur-13);
  var curSlice = allMonths.slice(startCur, endCur);
  var curLabels = curSlice.map(function(m){return shortLabel(m[0]);});

  var endFTE = nowIdx>=0 ? nowIdx+2 : allMonths.length;
  var startFTE = Math.max(0, endFTE-13);
  var fteSlice = allMonths.slice(startFTE, endFTE);
  var fteLabels = fteSlice.map(function(m){return shortLabel(m[0]);});

  // === Highlight trend charts ===
  var hlCharts = [
    { label:'Active Staff FTE', col:C.activeFTE, color:'#2563eb', type:'bar', slice:fteSlice, labels:fteLabels },
    { label:'FTEs Hired', col:C.totalHires, color:'#059669', type:'bar', slice:curSlice, labels:curLabels },
    { label:'Lost FTEs', col:C.churnedFTE, color:'#dc2626', type:'bar', slice:curSlice, labels:curLabels },
    { label:'Net FTE Gain/Loss', col:null, color:'#7c3aed', type:'bar', slice:curSlice, labels:curLabels, compute:function(m){ var h=pn(m[C.totalHires]),l=pn(m[C.churnedFTE]); return (h!==null&&l!==null)?Math.round((h-l)*100)/100:null; } }
  ];
  var hlHtml = '';
  for (var hi=0;hi<hlCharts.length;hi++) {
    hlHtml += '<div class="trend-chart-item"><h4>'+hlCharts[hi].label+'</h4><canvas id="hlchart_'+hi+'"></canvas></div>';
  }
  document.getElementById('highlightCharts').innerHTML = hlHtml;
  for (var hj=0;hj<hlCharts.length;hj++) {
    var hc = hlCharts[hj];
    var hData = hc.compute ? hc.slice.map(hc.compute) : hc.slice.map(function(m){return pn(m[hc.col]);});
    var hds = makeDS(hc);
    hds.data = hData;
    // For net FTE, color bars green/red based on value
    if (hc.label === 'Net FTE Gain/Loss') {
      hds.backgroundColor = hData.map(function(v){ return v>=0 ? 'rgba(5,150,105,0.65)' : 'rgba(220,38,38,0.65)'; });
      hds.borderColor = hData.map(function(v){ return v>=0 ? '#059669' : '#dc2626'; });
    }
    var hCtx = document.getElementById('hlchart_'+hj);
    if (hCtx) {
      new Chart(hCtx.getContext('2d'), {
        type: hc.type==='bar'?'bar':'line',
        data:{labels:hc.labels, datasets:[hds]},
        options:chartOpts()
      });
    }
  }

  // === Acquisition sub-blocks ===
  var acqSections = [
    { title:'Marketing', rows:[
      { label:'Google Ads Spend', col:C.adsSpend, format:'money' },
      { label:'Discovery Calls (MQLs)', col:C.mqls, format:'num' },
      { label:'Cost Per Discovery Call', col:C.costPerCall, format:'money' },
      { label:'Show Rate', col:C.showRate, format:'pctR' }
    ], charts:[
      { label:'Google Ads Spend', col:C.adsSpend, color:'#0891b2', type:'bar' },
      { label:'Discovery Calls (MQLs)', col:C.mqls, color:'#7c3aed', type:'bar' },
      { label:'Cost Per Discovery Call', col:C.costPerCall, color:'#e11d48', type:'line' }
    ]},
    { title:'Sales', rows:[
      { label:'New Client Jobs Opened', col:C.newClientJobs, format:'num' },
      { label:'New Client FTE Hires', col:C.newClientFTE, format:'dec' },
      { label:'MQL to New Client Job Opened Conversion Rate', col:C.salesConvRate, format:'pctR' },
      { label:'MQL to New Client FTE Conversion Rate (1 Month Conversion Window)', col:C.newClientFTEConv, format:'pctR' }
    ], charts:[
      { label:'New Client Jobs Opened', col:C.newClientJobs, color:'#059669', type:'bar' },
      { label:'New Client FTE Hires', col:C.newClientFTE, color:'#2563eb', type:'bar' },
      { label:'MQL to New Client Job Opened Conversion Rate', col:C.salesConvRate, color:'#d97706', type:'line', pct:true },
      { label:'MQL to New Client FTE Conversion Rate', col:C.newClientFTEConv, color:'#7c3aed', type:'line', pct:true }
    ]}
  ];
  renderSubBlocks('acqBlocks', acqSections, cur, prev, curSlice, curLabels);

  // === Expansion sub-blocks ===
  var expSections = [
    { title:'Client Expansion', rows:[
      { label:'Existing Client FTE Hires', col:C.existingFTE, format:'dec' },
      { label:'New Client FTE Hires', col:C.newClientFTE, format:'dec' },
      { label:'New Client FTE Conv (Hires/prev MQLs)', col:C.newClientFTEConv, format:'pctR' }
    ], charts:[
      { label:'Existing Client FTE', col:C.existingFTE, color:'#059669', type:'bar' },
      { label:'New Client FTE', col:C.newClientFTE, color:'#2563eb', type:'bar' }
    ]}
  ];
  renderSubBlocks('expBlocks', expSections, cur, prev, curSlice, curLabels);

  // === Churn & Backfill sub-blocks ===
  var churnSections = [
    { title:'Churn', rows:[
      { label:'Churned Staff (FTE)', col:C.churnedFTE, format:'dec', invert:true },
      { label:'Role Churn Rate', col:C.churnRate, format:'pct', invert:true },
      { label:'Staff Churned <1m %', col:C.churnUnder1m, format:'pctR', invert:true }
    ], charts:[
      { label:'Churned Staff (FTE)', col:C.churnedFTE, color:'#dc2626', type:'bar' },
      { label:'Role Churn Rate', col:C.churnRate, color:'#e11d48', type:'line' }
    ]},
    { title:'Backfill', rows:[
      { label:'Roles to be Backfilled', col:C.rolesToBackfill, format:'num' },
      { label:'Backfill Rate', col:C.backfillRate, format:'pct' },
      { label:'Backfill FTE Hires', col:C.backfillFTE, format:'dec' },
      { label:'Backfill Close Rate', col:C.backfillCloseRate, format:'pct' }
    ], charts:[
      { label:'Backfill FTE Hires', col:C.backfillFTE, color:'#059669', type:'bar' },
      { label:'Backfill Rate', col:C.backfillRate, color:'#d97706', type:'line' }
    ]}
  ];
  renderSubBlocks('churnBlocks', churnSections, cur, prev, curSlice, curLabels);

}).catch(function(err){
  document.getElementById('loading').innerHTML = '<div style="color:var(--red)">Error: '+err.message+'</div>';
});

// === Sub-block renderer ===
var _blockId = 0;
var _chartId = 0;
function renderSubBlocks(containerId, sections, cur, prev, slice, labels) {
  var container = document.getElementById(containerId);
  var html = '';
  var chartQueue = [];
  for (var s=0;s<sections.length;s++) {
    var sec = sections[s];
    var bid = 'block_' + (++_blockId);
    html += '<div class="sub-block">';
    html += '<div class="sub-block-header">'+sec.title+'</div>';
    html += '<table class="kpi-table"><thead><tr><th style="width:40%">Metric</th><th class="ar">Current</th><th class="ar">Previous</th><th class="ar">Change</th></tr></thead><tbody>';
    for (var i=0;i<sec.rows.length;i++) {
      var r = sec.rows[i];
      var cv = cur ? pn(cur[r.col]) : null;
      var pv = prev ? pn(prev[r.col]) : null;
      html += '<tr><td>'+r.label+'</td><td class="ar" style="font-weight:600">'+formatVal(cv,r.format)+'</td><td class="ar">'+formatVal(pv,r.format)+'</td>'+changeHtml(cv,pv,r.invert)+'</tr>';
    }
    html += '</tbody></table>';
    if (sec.charts && sec.charts.length > 0) {
      html += '<div class="trend-toggle" data-target="'+bid+'" onclick="toggleTrend(this)"><span class="arrow">&#9660;</span> Show Trend</div>';
      html += '<div class="trend-chart" id="'+bid+'"><div class="trend-chart-grid">';
      for (var ci=0;ci<sec.charts.length;ci++) {
        var cid = 'tchart_' + (++_chartId);
        var ch = sec.charts[ci];
        html += '<div class="trend-chart-item"><h4>'+ch.label+'</h4><canvas id="'+cid+'"></canvas></div>';
        chartQueue.push({ canvasId:cid, chart:ch, slice:slice, labels:labels });
      }
      html += '</div></div>';
    }
    html += '</div>';
  }
  container.innerHTML = html;

  // Render each individual chart
  for (var q=0;q<chartQueue.length;q++) {
    var item = chartQueue[q];
    var ds = makeDS(item.chart);
    ds.data = item.slice.map(function(m){return pn(m[item.chart.col]);});
    var opts = item.chart.pct ? chartOptsPct() : chartOpts();
    if (item.chart.pct) {
      ds.datalabels = { display:true, anchor:'end', align:'end', color:item.chart.color, font:{size:9,weight:'bold'}, formatter:function(v){return v!==null?v.toFixed(1)+'%':'';} };
    }
    var ctx = document.getElementById(item.canvasId);
    if (ctx) {
      new Chart(ctx.getContext('2d'), {
        type: item.chart.type==='bar'?'bar':'line',
        data:{labels:item.labels, datasets:[ds]},
        options:opts
      });
    }
  }
}

function toggleTrend(el) {
  var targetId = el.getAttribute('data-target');
  var panel = document.getElementById(targetId);
  el.classList.toggle('open');
  panel.classList.toggle('open');
  if (el.classList.contains('open')) {
    el.querySelector('.arrow').innerHTML = '&#9650;';
    el.childNodes[1].textContent = ' Hide Trend';
  } else {
    el.querySelector('.arrow').innerHTML = '&#9660;';
    el.childNodes[1].textContent = ' Show Trend';
  }
}

function formatVal(v, format) {
  if (v===null||v===undefined) return '—';
  if (format==='money') return fmtM(v);
  if (format==='pct') return fmtPct(v);
  if (format==='pctR') return fmtPctRaw(v);
  if (format==='dec') return fmtD(v);
  return fmt(v);
}

// === Chart helpers ===
function makeDS(s) {
  if (s.type==='bar') {
    return {type:'bar',label:s.label,data:s.data,backgroundColor:hexAlpha(s.color,0.65),borderColor:s.color,borderWidth:1,borderRadius:3};
  }
  return {type:'line',label:s.label,data:s.data,borderColor:s.color,backgroundColor:hexAlpha(s.color,0.08),borderDash:[5,3],fill:false,tension:0.3,borderWidth:2.5,pointRadius:3,pointHoverRadius:5};
}

function chartOpts() {
  return {
    responsive:true, maintainAspectRatio:false,
    interaction:{mode:'index',intersect:false},
    plugins:{legend:{position:'bottom',labels:{usePointStyle:true,padding:16,font:{size:11}}}},
    scales:{
      x:{grid:{display:false},ticks:{font:{size:10}}},
      y:{beginAtZero:true,grid:{color:'#f1f5f9'},ticks:{font:{size:10}}}
    }
  };
}

function chartOptsPct() {
  return {
    responsive:true, maintainAspectRatio:false,
    interaction:{mode:'index',intersect:false},
    layout:{padding:{top:20}},
    plugins:{legend:{position:'bottom',labels:{usePointStyle:true,padding:16,font:{size:11}}}},
    scales:{
      x:{grid:{display:false},ticks:{font:{size:10}}},
      y:{display:false,beginAtZero:true}
    }
  };
}

function hexAlpha(hex, alpha) {
  var r = parseInt(hex.slice(1,3),16);
  var g = parseInt(hex.slice(3,5),16);
  var b = parseInt(hex.slice(5,7),16);
  return 'rgba('+r+','+g+','+b+','+alpha+')';
}
</script>
