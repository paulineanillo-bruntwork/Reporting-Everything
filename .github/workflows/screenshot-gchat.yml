name: Dashboard Screenshot to Google Chat

on:
  schedule:
    # Every 4 hours starting midnight GMT+8 (12AM, 4AM, 8AM, 12PM, 4PM, 8PM)
    # GMT+8 to UTC: 16:00, 20:00, 0:00, 4:00, 8:00, 12:00
    - cron: '0 16,20,0,4,8,12 * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  post-update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Post Running Update to Google Chat
        env:
          HUBSPOT_TOKEN: ${{ secrets.HUBSPOT_TOKEN }}
          GCHAT_WEBHOOK: ${{ secrets.GCHAT_WEBHOOK }}
          DASHBOARD_URL: ${{ secrets.DASHBOARD_URL }}
        run: node screenshot-gchat.js
