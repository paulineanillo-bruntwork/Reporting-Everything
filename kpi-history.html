<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow, noarchive, nosnippet">
<title>Monthly KPI Tracker</title>
<style>
:root{--bg:#f4f6fb;--surface:#fff;--border:#e2e8f0;--text:#1e293b;--text-muted:#64748b;--blue:#2563eb;--blue-dark:#1e40af;--green:#059669;--green-light:#d1fae5;--red:#dc2626;--red-light:#fee2e2;--radius:16px;--shadow:0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Inter,-apple-system,BlinkMacSystemFont,sans-serif;background:var(--bg);color:var(--text);line-height:1.5}
.header{background:linear-gradient(135deg,#1e293b,#334155);color:#fff;padding:28px 40px 20px;display:flex;justify-content:space-between;align-items:flex-start}
.header h1{font-size:26px;font-weight:700;letter-spacing:-.5px;margin-bottom:4px}
.header .subtitle{color:#94a3b8;font-size:13px}
.back-link{display:inline-block;padding:8px 16px;background:rgba(255,255,255,.1);color:#cbd5e1;border:1px solid rgba(255,255,255,.2);border-radius:6px;font-size:13px;font-weight:500;text-decoration:none}
.back-link:hover{background:rgba(255,255,255,.2)}
.nav-links{display:flex;gap:8px;align-items:center}
.main{padding:28px 40px 60px;max-width:100%;margin:0 auto}
.loading{text-align:center;padding:80px 20px;color:var(--text-muted)}
.loading .spinner{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}
.error-msg{text-align:center;padding:60px 20px;color:var(--red)}
.error-msg h2{margin-bottom:8px}
.tbl-wrap{background:var(--surface);border-radius:var(--radius);box-shadow:var(--shadow);border:1px solid var(--border);overflow:hidden}
.tbl-scroll{overflow-x:auto;max-height:calc(100vh - 200px);overflow-y:auto}
table{border-collapse:collapse;font-size:12px;white-space:nowrap}
thead{position:sticky;top:0;z-index:10}
.btn-row th{padding:4px 10px;background:#f8fafc;border-right:1px solid var(--border);border-bottom:1px solid var(--border)}
.btn-row th:first-child{position:sticky;left:0;z-index:11;background:#f8fafc}
.get-btn{padding:3px 12px;border:1px solid var(--blue);background:var(--surface);color:var(--blue);border-radius:4px;font-size:11px;font-weight:600;cursor:pointer;transition:all .15s}
.get-btn:hover{background:var(--blue);color:#fff}
.get-btn.loading-btn{opacity:.6;cursor:wait}
.get-btn.done-btn{border-color:var(--green);color:var(--green);background:var(--green-light)}
.get-btn.err-btn{border-color:var(--red);color:var(--red);background:var(--red-light)}
.team-row th{padding:6px 10px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:#fff;border-right:1px solid rgba(255,255,255,.2)}
.header-row th{padding:8px 10px;font-weight:600;font-size:11px;color:var(--text-muted);border-bottom:2px solid var(--border);background:#f8fafc;border-right:1px solid var(--border);text-align:right}
.header-row th:first-child{text-align:left;position:sticky;left:0;z-index:11;background:#f8fafc}
.team-row th:first-child{position:sticky;left:0;z-index:11}
tbody td{padding:6px 10px;border-bottom:1px solid var(--border);border-right:1px solid #f1f5f9;text-align:right;font-variant-numeric:tabular-nums}
tbody td:first-child{text-align:left;font-weight:600;position:sticky;left:0;background:var(--surface);z-index:5;border-right:1px solid var(--border)}
tbody tr:hover td{background:#f8fafc}
tbody tr:hover td:first-child{background:#f0f4f8}
.empty-cell{color:#cbd5e1}
.team-bw{background:#1e40af}
.team-sales{background:#7c3aed}
.team-recruitment{background:#059669}
.team-client{background:#d97706}
.team-default{background:#475569}
.info-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;font-size:13px;color:var(--text-muted)}
.status-toast{position:fixed;bottom:24px;right:24px;padding:12px 20px;border-radius:8px;font-size:13px;font-weight:500;color:#fff;z-index:1000;opacity:0;transition:opacity .3s;pointer-events:none}
.status-toast.show{opacity:1}
.status-toast.success{background:var(--green)}
.status-toast.error{background:var(--red)}
@media(max-width:900px){.header,.main{padding-left:16px;padding-right:16px}}
</style>
</head>
<body>
<div class="header">
  <div>
    <h1>Monthly KPI Tracker</h1>
    <div class="subtitle">Last 24 months of historical KPI data</div>
  </div>
  <div class="nav-links">
    <a href="/" class="back-link">FTE Dashboard</a>
    <a href="/adspend" class="back-link">Ad Spend</a>
    <a href="/reports" class="back-link">Reports</a>
    <a href="/logout" class="back-link">Log out</a>
  </div>
</div>
<div class="main">
<div id="loading" class="loading"><div class="spinner"></div><div>Loading KPI data...</div></div>
<div id="errorMsg" class="error-msg" style="display:none"><h2>Failed to load</h2><p id="errorText"></p></div>
<div id="content" style="display:none">
  <div class="info-bar">
    <span id="infoText"></span>
    <span id="cacheInfo"></span>
  </div>
  <div class="tbl-wrap">
    <div class="tbl-scroll" id="tblScroll">
      <table id="kpiTable"></table>
    </div>
  </div>
</div>
</div>
<div id="toast" class="status-toast"></div>
<script>
function formatCell(val) {
  if (val === undefined || val === null || val === '') return '<span class="empty-cell">-</span>';
  return escHtml(String(val));
}

function showToast(msg, type) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'status-toast show ' + type;
  setTimeout(function() { t.className = 'status-toast'; }, 3000);
}

function generateMonth(month, btnId) {
  var btn = document.getElementById(btnId);
  btn.textContent = '...';
  btn.className = 'get-btn loading-btn';
  fetch('/api/kpi-history/generate', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ month: month })
  })
  .then(function(r) { return r.json(); })
  .then(function(data) {
    if (data.error) {
      btn.textContent = 'Get';
      btn.className = 'get-btn err-btn';
      showToast(data.error, 'error');
    } else {
      btn.textContent = 'Done';
      btn.className = 'get-btn done-btn';
      showToast('Generated data for ' + month, 'success');
      // Reload table after short delay
      setTimeout(function() { location.reload(); }, 1500);
    }
  })
  .catch(function(err) {
    btn.textContent = 'Get';
    btn.className = 'get-btn err-btn';
    showToast(err.message, 'error');
  });
}

fetch('/api/kpi-history')
  .then(function(r) { return r.json(); })
  .then(function(data) {
    document.getElementById('loading').style.display = 'none';

    if (data.error) {
      document.getElementById('errorMsg').style.display = 'block';
      document.getElementById('errorText').textContent = data.error;
      return;
    }

    var columns = data.columns || [];
    var months = data.months || [];

    if (months.length === 0) {
      document.getElementById('errorMsg').style.display = 'block';
      document.getElementById('errorText').textContent = 'No data found in the source spreadsheet.';
      return;
    }

    document.getElementById('content').style.display = 'block';
    document.getElementById('infoText').textContent = months.length + ' months of data, ' + columns.length + ' metrics';
    if (data.cached) document.getElementById('cacheInfo').textContent = 'Cached';

    var h = '<thead>';

    // Row 1: Get buttons
    h += '<tr class="btn-row"><th style="min-width:200px"></th>';
    for (var bi = 0; bi < months.length; bi++) {
      var monthLabel = months[bi][0] || '';
      var btnId = 'get-btn-' + bi;
      h += '<th><button class="get-btn" id="' + btnId + '" onclick="generateMonth(\'' + escAttr(monthLabel) + '\',\'' + btnId + '\')">Get</button></th>';
    }
    h += '</tr>';

    // Row 2: Month headers
    h += '<tr class="team-row"><th class="team-default" style="min-width:200px">Metric</th>';
    for (var mi = 0; mi < months.length; mi++) {
      h += '<th class="team-default">' + formatCell(months[mi][0]) + '</th>';
    }
    h += '</tr>';
    h += '</thead><tbody>';

    // Each column (except col 0 = month) becomes a row
    var currentTeam = '';
    for (var ci = 1; ci < columns.length; ci++) {
      var col = columns[ci];
      if (!col.name) continue;

      if (col.team && col.team !== currentTeam) {
        currentTeam = col.team;
        h += '<tr><td colspan="' + (months.length + 1) + '" style="padding:8px 10px;font-weight:700;font-size:11px;text-transform:uppercase;letter-spacing:.5px;background:' + getTeamBg(currentTeam) + ';color:' + getTeamColor(currentTeam) + ';border-bottom:2px solid ' + getTeamColor(currentTeam) + '">' + escHtml(currentTeam) + '</td></tr>';
      }

      h += '<tr><td title="' + escAttr(col.source) + '">' + escHtml(col.name) + '</td>';
      for (var mj = 0; mj < months.length; mj++) {
        h += '<td>' + formatCell(months[mj][ci]) + '</td>';
      }
      h += '</tr>';
    }

    h += '</tbody>';
    document.getElementById('kpiTable').innerHTML = h;

    var scroll = document.getElementById('tblScroll');
    scroll.scrollLeft = scroll.scrollWidth;
  })
  .catch(function(err) {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('errorMsg').style.display = 'block';
    document.getElementById('errorText').textContent = err.message;
  });

function getTeamBg(team) {
  if (team.indexOf('BW') !== -1) return '#eff6ff';
  if (team.indexOf('Sales') !== -1) return '#f5f3ff';
  if (team.indexOf('Recruitment') !== -1) return '#ecfdf5';
  if (team.indexOf('Client') !== -1) return '#fffbeb';
  return '#f8fafc';
}

function getTeamColor(team) {
  if (team.indexOf('BW') !== -1) return '#1e40af';
  if (team.indexOf('Sales') !== -1) return '#7c3aed';
  if (team.indexOf('Recruitment') !== -1) return '#059669';
  if (team.indexOf('Client') !== -1) return '#d97706';
  return '#475569';
}

function escHtml(s) {
  if (!s) return '';
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function escAttr(s) {
  if (!s) return '';
  return s.replace(/&/g,'&amp;').replace(/'/g,'\\\'').replace(/"/g,'&quot;');
}
</script>
</body>
</html>
