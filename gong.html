<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow, noarchive, nosnippet">
<title>Sales Report</title>
<style>
:root{--bg:#f4f6fb;--surface:#fff;--border:#e2e8f0;--text:#1e293b;--text-muted:#64748b;--blue:#2563eb;--blue-dark:#1e40af;--green:#059669;--green-light:#d1fae5;--red:#dc2626;--red-light:#fee2e2;--orange:#d97706;--purple:#7c3aed;--radius:16px;--shadow:0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Inter,-apple-system,BlinkMacSystemFont,sans-serif;background:var(--bg);color:var(--text);line-height:1.5}
.header{background:linear-gradient(135deg,#1e293b,#334155);color:#fff;padding:28px 40px 20px;display:flex;justify-content:space-between;align-items:flex-start}
.header h1{font-size:26px;font-weight:700;letter-spacing:-.5px;margin-bottom:4px}
.header .subtitle{color:#94a3b8;font-size:13px}
.back-link{display:inline-block;padding:8px 16px;background:rgba(255,255,255,.1);color:#cbd5e1;border:1px solid rgba(255,255,255,.2);border-radius:6px;font-size:13px;font-weight:500;text-decoration:none}
.back-link:hover{background:rgba(255,255,255,.2)}
.nav-links{display:flex;gap:8px;align-items:center}
.main{padding:28px 40px 60px;max-width:1400px;margin:0 auto}
.loading{text-align:center;padding:80px 20px;color:var(--text-muted)}
.loading .spinner{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}
.controls{display:flex;gap:12px;align-items:center;margin-bottom:24px;flex-wrap:wrap}
.controls select,.controls input{padding:8px 12px;border:1px solid var(--border);border-radius:8px;font-size:13px;background:var(--surface);color:var(--text)}
.controls button{padding:8px 20px;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;background:var(--blue);color:#fff;transition:background .15s}
.controls button:hover{background:var(--blue-dark)}
.controls button:disabled{opacity:.5;cursor:wait}
.summary-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:16px;margin-bottom:28px}
.summary-card{background:var(--surface);border-radius:var(--radius);padding:20px;box-shadow:var(--shadow);border:1px solid var(--border);text-align:center}
.summary-card .val{font-size:28px;font-weight:800;color:var(--text)}
.summary-card .lbl{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--text-muted);margin-top:4px}
.tbl-wrap{background:var(--surface);border-radius:var(--radius);box-shadow:var(--shadow);border:1px solid var(--border);overflow:hidden}
.tbl-scroll{overflow-x:auto;max-height:calc(100vh - 380px);overflow-y:auto}
table{border-collapse:collapse;font-size:12px;white-space:nowrap;width:100%}
thead{position:sticky;top:0;z-index:10}
th{padding:10px 12px;font-weight:600;font-size:11px;color:var(--text-muted);border-bottom:2px solid var(--border);background:#f8fafc;text-align:left;cursor:pointer;user-select:none}
th:hover{background:#eef2f7}
th.ar{text-align:right}
th .sort-arrow{font-size:9px;margin-left:4px;opacity:.4}
th.sorted .sort-arrow{opacity:1}
td{padding:8px 12px;border-bottom:1px solid var(--border);border-right:1px solid #f1f5f9}
td.ar{text-align:right;font-variant-numeric:tabular-nums}
tbody tr:hover td{background:#f8fafc}
.empty-cell{color:#cbd5e1}
.status-toast{position:fixed;bottom:24px;right:24px;padding:12px 20px;border-radius:8px;font-size:13px;font-weight:500;color:#fff;z-index:1000;opacity:0;transition:opacity .3s;pointer-events:none}
.status-toast.show{opacity:1}
.status-toast.error{background:var(--red)}
.status-toast.success{background:var(--green)}
.conv-rate{font-weight:700;color:var(--text)}
@media(max-width:900px){.header,.main{padding-left:20px;padding-right:20px}.summary-grid{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>
<div class="header">
  <div>
    <h1>Sales Report</h1>
  </div>
  <div class="nav-links">
    <a href="/" class="back-link">FTE Dashboard</a>
    <a href="/reports" class="back-link">Reports</a>
    <a href="/kpi" class="back-link">KPI Tracker</a>
    <a href="/logout" class="back-link">Log out</a>
  </div>
</div>
<div class="main">

<div class="controls">
  <label style="font-size:13px;font-weight:600">Close Month:</label>
  <input type="month" id="convMonthPicker" onchange="loadConversionCached()" />
  <button id="convLoadBtn" onclick="loadConversion()">Load latest data</button>
  <span id="convStatusText" style="font-size:12px;color:var(--text-muted)"></span>
  <span style="font-size:11px;color:var(--text-muted);margin-left:auto">Closed FTE in selected month vs Gong calls in prior month (Full-Time=1, Part-Time=0.5, Other=0.25)</span>
</div>

<div id="convLoading" class="loading" style="display:none">
  <div class="spinner"></div>
  <div>Matching sales agents across Gong &amp; HubSpot...</div>
</div>

<div id="convContent" style="display:none">
  <div class="summary-grid" id="convSummaryCards"></div>
  <div class="tbl-wrap">
    <div class="tbl-scroll">
      <table>
        <thead id="convTableHead"></thead>
        <tbody id="convTableBody"></tbody>
      </table>
    </div>
  </div>
</div>

</div>
<div class="status-toast" id="toast"></div>

<script>
var now = new Date();
var yr = now.getFullYear();
var mo = now.getMonth();
if (mo === 0) { yr--; mo = 12; }
document.getElementById('convMonthPicker').value = yr + '-' + String(mo).padStart(2, '0');

var convData = null;
var convSortCol = 'closures';
var convSortAsc = false;

function showToast(msg, type) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'status-toast show ' + type;
  setTimeout(function() { t.className = 'status-toast'; }, 3000);
}

function renderConvResult(data) {
  convData = data;
  renderConvSummary(data);
  renderConvTable(data);
  document.getElementById('convContent').style.display = 'block';
  var cacheNote = data.cached ? ' (cached ' + new Date(data.cachedAt).toLocaleString() + ')' : ' (fresh)';
  document.getElementById('convStatusText').textContent =
    'Closures in ' + data.closeMonth + ' vs calls in ' + data.callsMonth + cacheNote;
}

// Load conversion data from cache only (sheet or in-memory) — never fetches live
function loadConversionCached() {
  var month = document.getElementById('convMonthPicker').value;
  if (!month) return;
  document.getElementById('convContent').style.display = 'none';
  document.getElementById('convStatusText').textContent = 'Loading cached data...';

  // Try sheet cache, then in-memory (no refresh)
  fetch('/api/gong/conversion-cached?month=' + month)
    .then(function(r) { return r.json(); })
    .then(function(data) {
      if (data && !data.empty && !data.error) {
        renderConvResult(data);
      } else {
        // Try in-memory cache on server (no refresh — won't hit Gong/HubSpot)
        return fetch('/api/gong/conversion?month=' + month)
          .then(function(r) { return r.json(); })
          .then(function(data2) {
            if (data2 && !data2.error) {
              renderConvResult(data2);
            } else {
              document.getElementById('convStatusText').textContent = 'No cached data. Click Load to fetch from Gong & HubSpot.';
            }
          });
      }
    })
    .catch(function() {
      document.getElementById('convStatusText').textContent = 'No cached data. Click Load to fetch from Gong & HubSpot.';
    });
}

// Fetch from server endpoint — refresh=true bypasses all caches
function fetchConversionFromServer(month, refresh) {
  var btn = document.getElementById('convLoadBtn');
  btn.disabled = true;
  btn.textContent = 'Loading...';
  document.getElementById('convLoading').style.display = 'block';
  document.getElementById('convContent').style.display = 'none';
  document.getElementById('convStatusText').textContent = '';

  var url = '/api/gong/conversion?month=' + month;
  if (refresh) url += '&refresh=true';

  fetch(url)
    .then(function(r) {
      if (r.status === 401) { alert('Session expired.'); window.location.href = '/login'; return; }
      return r.json();
    })
    .then(function(data) {
      if (!data) return;
      if (data.error) { showToast(data.error, 'error'); return; }
      renderConvResult(data);
    })
    .catch(function(err) { showToast('Error: ' + err.message, 'error'); })
    .finally(function() {
      btn.disabled = false;
      btn.textContent = 'Load latest data';
      document.getElementById('convLoading').style.display = 'none';
    });
}

// Load button = force refresh from Gong + HubSpot APIs
function loadConversion() {
  var month = document.getElementById('convMonthPicker').value;
  if (!month) return;
  fetchConversionFromServer(month, true);
}

function renderConvSummary(data) {
  var convPct = data.overallConversion !== null ? data.overallConversion + '%' : '—';
  var cards = [
    { val: Math.round(data.totalClosures).toLocaleString(), lbl: 'Closed FTE (' + data.closeMonth + ')' },
    { val: data.totalGongCalls.toLocaleString(), lbl: 'Discovery Calls Completed (' + data.callsMonth + ')' },
    { val: convPct, lbl: 'Overall Conversion Rate' }
  ];
  var h = '';
  for (var i = 0; i < cards.length; i++) {
    h += '<div class="summary-card"><div class="val">' + cards[i].val + '</div><div class="lbl">' + cards[i].lbl + '</div></div>';
  }
  document.getElementById('convSummaryCards').innerHTML = h;
}

function getConvCols(data) {
  var callsMonth = data && data.callsMonth ? data.callsMonth : 'Prior Month';
  var closeMonth = data && data.closeMonth ? data.closeMonth : '';
  return [
    { key: 'agent', label: 'Sales Agent', align: 'left' },
    { key: 'gongCalls', label: 'Discovery Calls Completed (' + callsMonth + ')', align: 'right' },
    { key: 'closures', label: 'Closed FTE' + (closeMonth ? ' (' + closeMonth + ')' : ''), align: 'right' },
    { key: 'conversionRate', label: 'Conversion Rate', align: 'right' }
  ];
}

function renderConvTable(data) {
  var CONV_COLS = getConvCols(data);
  var rows = data.agents.slice();
  if (convSortCol) {
    rows.sort(function(a, b) {
      var av = a[convSortCol], bv = b[convSortCol];
      if (av === null) av = -1;
      if (bv === null) bv = -1;
      if (typeof av === 'string') return convSortAsc ? av.localeCompare(bv) : bv.localeCompare(av);
      return convSortAsc ? (av - bv) : (bv - av);
    });
  }

  var th = '<tr>';
  for (var c = 0; c < CONV_COLS.length; c++) {
    var col = CONV_COLS[c];
    var sorted = convSortCol === col.key;
    var arrow = sorted ? (convSortAsc ? '&#9650;' : '&#9660;') : '&#9650;';
    var cls = [];
    if (col.align === 'right') cls.push('ar');
    if (sorted) cls.push('sorted');
    th += '<th' + (cls.length ? ' class="' + cls.join(' ') + '"' : '') + ' onclick="doConvSort(\'' + col.key + '\')">' + col.label + '<span class="sort-arrow">' + arrow + '</span></th>';
  }
  th += '</tr>';
  document.getElementById('convTableHead').innerHTML = th;

  var h = '';
  for (var i = 0; i < rows.length; i++) {
    var r = rows[i];
    var rateStr = r.conversionRate !== null ? r.conversionRate + '%' : '—';
    h += '<tr>';
    h += '<td>' + r.agent + '</td>';
    h += '<td class="ar">' + r.gongCalls.toLocaleString() + '</td>';
    h += '<td class="ar">' + Math.round(r.closures).toLocaleString() + '</td>';
    h += '<td class="ar"><span class="conv-rate">' + rateStr + '</span></td>';
    h += '</tr>';
  }

  // Totals
  if (rows.length > 0) {
    var totG = 0, totC = 0;
    for (var t = 0; t < rows.length; t++) { totG += rows[t].gongCalls; totC += rows[t].closures; }
    var totRate = totG > 0 ? Math.round((totC / totG) * 1000) / 10 + '%' : '—';
    h += '<tr style="font-weight:700;background:#f8fafc"><td>Total</td><td class="ar">' + totG.toLocaleString() + '</td><td class="ar">' + Math.round(totC).toLocaleString() + '</td><td class="ar">' + totRate + '</td></tr>';
  }
  document.getElementById('convTableBody').innerHTML = h;
}

function doConvSort(key) {
  if (convSortCol === key) { convSortAsc = !convSortAsc; }
  else { convSortCol = key; convSortAsc = key === 'agent'; }
  if (convData) renderConvTable(convData);
}

// Auto-load from cache on page open
loadConversionCached();
</script>
</body>
</html>
